name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: bkness/bkness
          token: ${{ secrets.PROFILE_PAT }}
          path: profile

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: bkness
          outputs: |
            profile/github-snake.svg
            profile/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push to profile
        run: |
          cd profile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-snake.svg github-snake-dark.svg
          git diff --cached --quiet || git commit -m "chore: update contribution snake"
          git push
